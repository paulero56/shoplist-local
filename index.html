<!DOCTYPE html>
<html>
  <head>
    <title>Shopping List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="Shopping List" />
    <meta property="og:description" content="Tu lista de compras personal, guardada en tu dispositivo" />
    <meta property="og:image" content="https://shoplist-local.netlify.app/shoppincart.jpg" />
    <meta property="og:url" content="https://shoplist-local.netlify.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shoplist-local.netlify.app/shoppincart.jpg" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <div class="container">
      <img src="/shoppincart.jpg" class="app-icon" />
      <h1 class="app-title">Shopping List</h1>
      <input type="text" id="input-field" placeholder="Ej. Huevos" />
      <button id="add-button">Agregar Mandado</button>
      <button id="undo-button" class="undo-button">Regresar Articulo</button>
      <ul id="shopping-list"></ul>
    </div>
    <script src="index.js"></script>
  </body>
</html>
