<!DOCTYPE html>
<html lang="es">
  <head>
    <title>CartIt — Tu lista de compras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="CartIt — Tu lista de compras" />
    <meta property="og:description" content="Tu lista de compras personal, guardada en tu dispositivo" />
    <meta property="og:image" content="https://shoplist-local.netlify.app/assets/shopping-cart-full-food-yellow-background-grocery-food-store-concept_708636-682.jpg" />
    <meta property="og:url" content="https://shoplist-local.netlify.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shoplist-local.netlify.app/assets/shopping-cart-full-food-yellow-background-grocery-food-store-concept_708636-682.jpg" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>

    <div class="wrapper">
      <header class="app-header">
        <div class="app-icon-wrap">🛒</div>
        <h1 class="app-title">CartIt</h1>
        <p class="app-subtitle">Tu lista, solo tuya</p>
        <span class="item-count" id="item-count">0 artículos</span>
      </header>

      <div class="card">
        <div class="input-row">
          <button id="add-button" aria-label="Agregar">+</button>
          <input type="text" id="input-field" placeholder="¿Qué necesitas comprar?" autocomplete="off" />
        </div>

        <ul id="shopping-list"></ul>

        <div class="actions-row">
          <button id="undo-button" class="btn-undo">↩ Deshacer</button>
          <button id="clear-button" class="btn-clear">🗑 Limpiar todo</button>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
